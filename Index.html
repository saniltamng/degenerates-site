<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><title>Degenerates – API Login</title>
<style>
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#111;color:#ddd;display:flex;justify-content:center;align-items:center;height:100vh}
 .box{background:#222;padding:2rem;border-radius:.5rem;text-align:center}
  input{margin:.5rem 0;padding:.5rem;width:220px}
  button{padding:.5rem 1rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="box">
  <h2>Enter API Key</h2>
  <input id="key" type="text" placeholder="Torn API key"><br>
  <button onclick="login()">Enter</button>
</div>
<script>
async function login(){
  const k=document.getElementById('key').value.trim();
  if(!k) return alert('Key required');
  try{
    const r=await fetch(`https://api.torn.com/user/?selections=profile&key=${k}`);
    const d=await r.json();
    if(d.error) throw new Error(d.error.error);
    localStorage.setItem('tornKey',k);
    localStorage.setItem('userFull', `${d.name} [${d.player_id}]`);
    location.href='dashboard.html';
  }catch(e){alert('Invalid key: '+e.message);}
}
</script>
</body>
</html>
